<body>

</div><br><br><br>
<div class="card-grid">

    <!-- Card 1 -->
    <div class="card">
      <div class="card-image">
        <img src="iwfy.png" alt="Product Image">
      </div>
      <div class="card-content">
        <h3 class="card-title">I Will Find You</h3>
        <p class="card-description">

    <!-- Card 2 -->
    <div class="card">
      <div class="card-image">
        <img src="op.png" alt="Product Image">

      <div class="card-content">
        <h3 class="card-title">One Peice</h3>
        <p class="card-description">
         2 Seasons<br>Released on April 30,2022
        </p>
      </div>

    <!-- Card 3 -->
    <div class="card">
      <div class="card-image">
        <img src="st.png" alt="Product Image">
      </div>
      <div class="card-content">
        <h3 class="card-title">Stranger Things</h3>
        <p class="card-description">
          3 Seasons<br>Released on Sep 16,2024
        </p>
      </div>
    </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // 1. Paste your exact Firebase Config here
    const firebaseConfig = {
  apiKey: "AIzaSyCQdkuuTAvR7W7O4AKzvLG4E6p4yzRABJc",
  authDomain: "opih-e3eb5.firebaseapp.com",
  projectId: "opih-e3eb5",
  storageBucket: "opih-e3eb5.firebasestorage.app",
  messagingSenderId: "892201531636",
  appId: "1:892201531636:web:3765735604a0616752c6a1",
  measurementId: "G-9ZZ96PBRSP"
};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 2. Check if user is logged in
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        // If no user is logged in, send them back to login screen
        window.location.href = "index.html";
      } else {
        console.log("Logged in user:", user.email);
      }
    });

    // 3. Handle Log Out
    const logoutBtn = document.getElementById("logoutBtn");
    logoutBtn.addEventListener("click", () => {
      signOut(auth).then(() => {
        window.location.href = "index.html";
      });
    });
  </script>
</body>
